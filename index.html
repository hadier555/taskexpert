<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎬 VAST Full‑Screen Ad Player</title>
    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html {
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #main {
            display: flex;
            flex-direction: column;
            width: 100vw; height: 100vh;
            background: #0a0a12;
        }
        #ad-container {
            flex: 1;
            position: relative;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #ad-container video {
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
        }
        #play-btn {
            position: absolute;
            padding: 18px 50px;
            font-size: 28px;
            font-weight: bold;
            background: #ff5722;
            color: #fff;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,87,34,0.6);
            z-index: 20;
            transition: 0.3s;
        }
        #play-btn:hover { background: #e64a19; transform: scale(1.05); }
        #play-btn:active { transform: scale(0.95); }

        #loading {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
            z-index: 10;
            color: #fff;
            gap: 12px;
        }
        #loading .spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        #error-msg {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffcc00;
            background: rgba(0,0,0,0.85);
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
            z-index: 30;
            border: 1px solid #ffcc00;
            text-align: center;
            max-width: 90%;
        }
        #retry-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 14px 40px;
            font-size: 20px;
            font-weight: bold;
            background: #ff5722;
            color: #fff;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            display: none;
            z-index: 25;
            box-shadow: 0 0 20px rgba(255,87,34,0.5);
        }
        #retry-btn:hover { background: #e64a19; }

        #bottom-bar {
            height: 80px;
            min-height: 80px;
            background: #1c1c1e;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            gap: 10px;
            flex-wrap: nowrap;
        }
        .sponsor-text {
            color: #888;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
        }
        .sponsor-text span { color: #aaa; font-weight: 300; }
        .action-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .btn {
            padding: 10px 28px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.94); }
        .btn-download { background: #34a853; color: #fff; }
        .btn-download:hover { background: #2d9248; }
        .btn-share { background: #1a73e8; color: #fff; }
        .btn-share:hover { background: #1558b0; }

        .ad-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 15;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            pointer-events: none;
        }
        .ad-controls * { pointer-events: auto; }
        .ad-countdown {
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            min-width: 80px;
            text-align: center;
        }
        .ad-skip-btn {
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
        }
        .ad-skip-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .ad-skip-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.15);
            border-color: #fff;
        }
        .ad-cta {
            background: #f59e0b;
            color: #000;
            padding: 6px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(245,158,11,0.4);
            transition: 0.2s;
        }
        .ad-cta:hover { transform: scale(1.05); }
        #ad-status {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 13px;
            background: rgba(0,0,0,0.6);
            padding: 6px 18px;
            border-radius: 20px;
            z-index: 15;
            pointer-events: none;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            .btn { padding: 8px 16px; font-size: 14px; }
            .sponsor-text { font-size: 11px; }
            #play-btn { padding: 14px 30px; font-size: 22px; }
            #bottom-bar { padding: 0 12px; height: 70px; min-height: 70px; }
            .ad-controls { gap: 10px; padding: 8px 14px; flex-wrap: wrap; justify-content: center; }
            .ad-countdown { font-size: 12px; min-width: 60px; }
        }
    </style>
</head>
<body>
<div id="main">
    <div id="ad-container">
        <video id="ad-video" playsinline muted></video>
        <div id="loading">
            <div class="spinner"></div>
            <span>Loading ad...</span>
        </div>
        <button id="play-btn">▶ Play Ad</button>
        <button id="retry-btn">🔄 Retry</button>
        <div id="error-msg"></div>
        <div id="ad-status">Initializing...</div>

        <div class="ad-controls" id="ad-controls" style="display:none;">
            <span class="ad-countdown" id="ad-countdown">Ad · 0s</span>
            <button class="ad-skip-btn" id="ad-skip-btn" disabled>Skip ⏳</button>
            <a class="ad-cta" id="ad-cta" href="#" target="_blank">🔗 Visit Advertiser</a>
        </div>
    </div>

    <div id="bottom-bar">
        <div class="sponsor-text">📢 <span>Sponsored</span> · Google Play</div>
        <div class="action-buttons">
            <a href="#" id="download-link" class="btn btn-download">⬇️ Download</a>
            <button id="share-btn" class="btn btn-share">🔗 Share</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ===== 🔴 SIRF AAP KA NAYA VAST URL (3 hours wala) =====
        const VAST_URL = 'https://difficultblock.com/dxm.FazZdVGvNlv/Z/G/Ux/EeCmJ9NubZPUplokgPvT/cfyPN_Dbkh2/NDjkkdtSNezsI/0UOvT/Yr3ZMJwo';
        const DEFAULT_CTA = 'https://google.com';
        const SKIP_DELAY = 6;

        const video = document.getElementById('ad-video');
        const container = document.getElementById('ad-container');
        const playBtn = document.getElementById('play-btn');
        const retryBtn = document.getElementById('retry-btn');
        const errorMsg = document.getElementById('error-msg');
        const loading = document.getElementById('loading');
        const adStatus = document.getElementById('ad-status');
        const adControls = document.getElementById('ad-controls');
        const countdown = document.getElementById('ad-countdown');
        const skipBtn = document.getElementById('ad-skip-btn');
        const ctaBtn = document.getElementById('ad-cta');
        const downloadLink = document.getElementById('download-link');
        const shareBtn = document.getElementById('share-btn');

        let adsLoader = null, adsManager = null, adDisplayContainer = null;
        let isAdPlaying = false;
        let skipInterval = null, loadTimeout = null;

        function setStatus(msg) { adStatus.textContent = msg; console.log('[Ad]', msg); }
        function showError(msg, showRetry = false) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = '⚠️ ' + msg;
            retryBtn.style.display = showRetry ? 'block' : 'none';
        }
        function hideError() {
            errorMsg.style.display = 'none';
            retryBtn.style.display = 'none';
        }
        function showLoading(show) {
            loading.style.display = show ? 'flex' : 'none';
        }
        function showControls(show) {
            adControls.style.display = show ? 'flex' : 'none';
        }

        function resetPlayer() {
            isAdPlaying = false;
            clearInterval(skipInterval);
            clearTimeout(loadTimeout);
            if (adsManager) { try { adsManager.destroy(); } catch(e) {} adsManager = null; }
            video.pause();
            video.removeAttribute('src');
            video.load();
            showControls(false);
            skipBtn.disabled = true;
            skipBtn.textContent = 'Skip ⏳';
            countdown.textContent = 'Ad · 0s';
            playBtn.style.display = 'block';
            playBtn.textContent = '▶ Play Ad';
            hideError();
            showLoading(false);
            setStatus('Ready');
        }

        function loadAd() {
            resetPlayer();
            hideError();
            showLoading(true);
            setStatus('Loading ad...');
            playBtn.style.display = 'none';
            initIMA();
            setTimeout(requestVast, 200);
        }

        function initIMA() {
            try {
                adDisplayContainer = new google.ima.AdDisplayContainer(container, video);
                adDisplayContainer.initialize();
                adsLoader = new google.ima.AdsLoader(adDisplayContainer);
                adsLoader.addEventListener(google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED, onAdsManagerLoaded);
                adsLoader.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, onAdError);
            } catch(e) {
                setStatus('IMA init error');
                showError('IMA init error: ' + e.message, true);
                showLoading(false);
                playBtn.style.display = 'block';
            }
        }

        function requestVast() {
            setStatus('Requesting VAST...');
            const req = new google.ima.AdsRequest();
            req.adTagUrl = VAST_URL;
            req.linearAdSlotWidth = 640;
            req.linearAdSlotHeight = 360;
            req.setAdWillAutoPlay(true);
            req.setAdWillPlayMuted(true);
            try {
                adsLoader.requestAds(req);
                loadTimeout = setTimeout(() => {
                    if (!isAdPlaying) {
                        setStatus('VAST load timeout');
                        showError('Ad load timeout. Retry?', true);
                        showLoading(false);
                        playBtn.style.display = 'block';
                    }
                }, 12000);
            } catch(e) {
                setStatus('Request failed');
                showError('Request error: ' + e.message, true);
                showLoading(false);
                playBtn.style.display = 'block';
            }
        }

        function onAdsManagerLoaded(event) {
            clearTimeout(loadTimeout);
            const settings = new google.ima.AdsRenderingSettings();
            settings.restoreCustomPlaybackStateOnAdBreakComplete = true;
            adsManager = event.getAdsManager(video, settings);
            adsManager.addEventListener(google.ima.AdEvent.Type.LOADED, () => {
                showLoading(false);
                setStatus('Ad loaded');
            });
            adsManager.addEventListener(google.ima.AdEvent.Type.STARTED, () => {
                isAdPlaying = true;
                showLoading(false);
                setStatus('Ad started');
                showControls(true);
                startSkipTimer();
            });
            adsManager.addEventListener(google.ima.AdEvent.Type.COMPLETE, finishAd);
            adsManager.addEventListener(google.ima.AdEvent.Type.SKIPPED, finishAd);
            adsManager.addEventListener(google.ima.AdEvent.Type.ALL_ADS_COMPLETED, finishAd);
            adsManager.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, onAdError);
            try {
                adsManager.init(640, 360, google.ima.ViewMode.NORMAL);
                adsManager.start();
            } catch(e) {
                setStatus('AdManager start error');
                showError('AdManager error: ' + e.message, true);
                showLoading(false);
                playBtn.style.display = 'block';
            }
        }

        function onAdError(event) {
            clearTimeout(loadTimeout);
            const err = event?.getError?.()?.toString() || 'unknown';
            setStatus('Ad error: ' + err);
            showError('Ad error: ' + err + '. Click Retry.', true);
            showLoading(false);
            playBtn.style.display = 'block';
        }

        function finishAd() {
            setStatus('Ad finished');
            resetPlayer();
            playBtn.style.display = 'block';
            playBtn.textContent = '▶ Play Again';
        }

        function startSkipTimer() {
            let rem = SKIP_DELAY;
            skipBtn.disabled = true;
            skipBtn.textContent = `Skip ⏳ ${rem}s`;
            countdown.textContent = `Ad · ${rem}s`;
            skipInterval = setInterval(() => {
                rem--;
                if (rem <= 0) {
                    clearInterval(skipInterval);
                    skipBtn.disabled = false;
                    skipBtn.textContent = 'Skip ▶';
                    countdown.textContent = 'Skip now';
                } else {
                    skipBtn.textContent = `Skip ⏳ ${rem}s`;
                    countdown.textContent = `Ad · ${rem}s`;
                }
            }, 1000);
        }

        skipBtn.addEventListener('click', () => {
            if (skipBtn.disabled) return;
            if (adsManager) {
                try { adsManager.skip(); } catch(e) { finishAd(); }
            } else {
                finishAd();
            }
        });

        retryBtn.addEventListener('click', () => {
            loadAd();
        });

        playBtn.addEventListener('click', loadAd);

        ctaBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (adsManager) {
                try { adsManager.click(); } catch(e) { window.open(DEFAULT_CTA, '_blank'); }
            } else {
                window.open(DEFAULT_CTA, '_blank');
            }
        });

        // 🔽 Yahan apni download link daalein
        downloadLink.href = 'https://play.google.com/store/apps/details?id=com.example.app';
        shareBtn.addEventListener('click', () => {
            const data = { title: 'Check this app!', text: 'Download now!', url: downloadLink.href };
            if (navigator.share) {
                navigator.share(data).catch(()=>{});
            } else {
                const input = document.createElement('input');
                input.value = data.url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert('Link copied!');
            }
        });

        setStatus('Ready');
        playBtn.style.display = 'block';
        showControls(false);
        console.log('✅ VAST player ready. URL:', VAST_URL);
    })();
</script>
</body>
</html>
