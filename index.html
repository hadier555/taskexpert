<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Login Test Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #334155;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 {
            font-size: 24px;
            color: #38bdf8;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        .btn-google {
            background: #4285F4;
        }
        .btn-google:hover {
            background: #357ae8;
        }
        .btn-danger {
            background: #dc2626;
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        .user-info {
            background: #0f172a;
            padding: 16px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
            border: 1px solid #334155;
        }
        .user-info p {
            margin: 6px 0;
            font-size: 14px;
            word-break: break-all;
        }
        .user-info .label {
            color: #94a3b8;
            font-weight: 600;
        }
        .user-info .value {
            color: #e2e8f0;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .status-badge.logged-in {
            background: #065f46;
            color: #34d399;
        }
        .status-badge.logged-out {
            background: #451a03;
            color: #fbbf24;
        }
        .error-msg {
            color: #f87171;
            font-size: 14px;
            margin-top: 10px;
            background: #7f1d1d;
            padding: 10px;
            border-radius: 6px;
        }
        .success-msg {
            color: #34d399;
            font-size: 14px;
            margin-top: 10px;
            background: #065f46;
            padding: 10px;
            border-radius: 6px;
        }
        .redirect-note {
            background: #1e3a5f;
            border: 1px solid #2563eb;
            border-radius: 6px;
            padding: 10px;
            font-size: 13px;
            color: #93c5fd;
            margin-top: 16px;
        }
        .redirect-note strong {
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 Google Login Test</h1>
        <p class="subtitle">Test Panel for taskexpert.pages.dev</p>

        <!-- Status Badge -->
        <div id="statusBadge" class="status-badge logged-out">⏳ Checking...</div>

        <!-- User Info (Hidden by default) -->
        <div id="userInfoDiv" style="display: none;">
            <div class="user-info">
                <p><span class="label">👤 Name:</span> <span class="value" id="userName">-</span></p>
                <p><span class="label">📧 Email:</span> <span class="value" id="userEmail">-</span></p>
                <p><span class="label">🆔 User ID:</span> <span class="value" id="userId">-</span></p>
                <p><span class="label">✅ Verified:</span> <span class="value" id="userVerified">-</span></p>
            </div>
            <button class="btn btn-danger" id="logoutBtn">🚪 Sign Out</button>
        </div>

        <!-- Login Button (Hidden when logged in) -->
        <div id="loginDiv">
            <button class="btn btn-google" id="loginBtn">🔑 Sign in with Google</button>
        </div>

        <!-- Messages -->
        <div id="message"></div>

        <!-- Redirect Info -->
        <div class="redirect-note">
            ⚡ Redirect URL: <strong>https://taskexpert.pages.dev</strong>
            <br><small>(Is panel ke login ke baad wapas yahi page aayega)</small>
        </div>
    </div>

    <script>
        // ============================================================
        // 🔥 SUPABASE CREDENTIALS (Aap ki hi settings)
        // ============================================================
        const SUPABASE_URL = 'https://bfqkwwkvnioreeagyvco.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_BVS4gTa_FpesnI8t3CTUjw_qxNUwiHG';

        // ============================================================
        // ✅ REDIRECT URL – HARDCODED TO PRODUCTION (LOCALHOST NAHI)
        // ============================================================
        const REDIRECT_URL = 'https://taskexpert.pages.dev';

        // ============================================================
        // INIT SUPABASE
        // ============================================================
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // DOM REFS
        // ============================================================
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginDiv = document.getElementById('loginDiv');
        const userInfoDiv = document.getElementById('userInfoDiv');
        const statusBadge = document.getElementById('statusBadge');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');
        const userId = document.getElementById('userId');
        const userVerified = document.getElementById('userVerified');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type = 'error') {
            messageDiv.innerHTML = `<div class="${type === 'error' ? 'error-msg' : 'success-msg'}">${text}</div>`;
            setTimeout(() => { messageDiv.innerHTML = ''; }, 6000);
        }

        // ============================================================
        // UPDATE UI
        // ============================================================
        function updateUI(user) {
            if (user) {
                // Logged In
                statusBadge.textContent = '✅ Logged In';
                statusBadge.className = 'status-badge logged-in';
                loginDiv.style.display = 'none';
                userInfoDiv.style.display = 'block';
                userName.textContent = user.user_metadata?.full_name || user.email || 'N/A';
                userEmail.textContent = user.email || 'N/A';
                userId.textContent = user.id || 'N/A';
                userVerified.textContent = user.email_confirmed_at ? '✅ Yes' : '❌ No';
                showMessage('✅ Login successful! Welcome back.', 'success');
            } else {
                // Logged Out
                statusBadge.textContent = '🔴 Logged Out';
                statusBadge.className = 'status-badge logged-out';
                loginDiv.style.display = 'block';
                userInfoDiv.style.display = 'none';
                showMessage('Please sign in to continue.', 'error');
            }
        }

        // ============================================================
        // LOGIN FUNCTION
        // ============================================================
        async function loginWithGoogle() {
            messageDiv.innerHTML = '<div class="success-msg">⏳ Redirecting to Google...</div>';
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        // ✅ YAHAN LOCALHOST NAHI, SIRF PRODUCTION URL
                        redirectTo: REDIRECT_URL 
                    }
                });

                if (error) {
                    showMessage('❌ Login Error: ' + error.message, 'error');
                } else {
                    // Browser Google par redirect ho jayega
                    showMessage('🔄 Redirecting to Google...', 'success');
                }
            } catch (err) {
                showMessage('❌ Exception: ' + err.message, 'error');
            }
        }

        // ============================================================
        // LOGOUT FUNCTION
        // ============================================================
        async function logout() {
            await supabase.auth.signOut();
            updateUI(null);
            showMessage('👋 Logged out successfully.', 'error');
        }

        // ============================================================
        // CHECK SESSION ON PAGE LOAD
        // ============================================================
        async function checkSession() {
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                if (error) {
                    showMessage('Session error: ' + error.message, 'error');
                    updateUI(null);
                    return;
                }
                if (session) {
                    updateUI(session.user);
                } else {
                    updateUI(null);
                }
            } catch (err) {
                showMessage('Check error: ' + err.message, 'error');
                updateUI(null);
            }
        }

        // ============================================================
        // AUTH STATE CHANGE LISTENER (For callback handling)
        // ============================================================
        supabase.auth.onAuthStateChange((event, session) => {
            console.log('Auth Event:', event);
            if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
                if (session) {
                    updateUI(session.user);
                    showMessage('🎉 Successfully logged in!', 'success');
                }
            } else if (event === 'SIGNED_OUT') {
                updateUI(null);
                showMessage('👋 Logged out.', 'error');
            }
        });

        // ============================================================
        // ATTACH EVENTS
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            loginBtn.addEventListener('click', loginWithGoogle);
            logoutBtn.addEventListener('click', logout);
            checkSession();
        });
    </script>
</body>
</html>
