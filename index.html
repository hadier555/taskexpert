<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <!-- ✅ Site verification meta tag -->
    <meta name="clckd" content="c124c5939d8a569ff3823b803fba763f" />
    <title>🎬 VAST Full‑Screen Ad Player</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html {
            width: 100%; height: 100%;
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #main {
            display: flex;
            flex-direction: column;
            width: 100vw; height: 100vh;
            background: #0a0a12;
        }
        #ad-container {
            flex: 1;
            position: relative;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
        }
        #ad-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        /* Fullscreen mode me video ko stretch */
        #main:-webkit-full-screen #ad-container video { object-fit: contain; }
        #main:-moz-full-screen #ad-container video { object-fit: contain; }
        #main:fullscreen #ad-container video { object-fit: contain; }

        #play-btn {
            position: absolute;
            padding: 18px 50px;
            font-size: 28px;
            font-weight: bold;
            background: #ff5722;
            color: #fff;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255,87,34,0.6);
            z-index: 20;
            transition: 0.3s;
        }
        #play-btn:hover { background: #e64a19; transform: scale(1.05); }
        #play-btn:active { transform: scale(0.95); }

        #loading {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
            z-index: 10;
            color: #fff;
            gap: 12px;
        }
        #loading .spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        #error-msg {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffcc00;
            background: rgba(0,0,0,0.85);
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
            z-index: 30;
            border: 1px solid #ffcc00;
            text-align: center;
            max-width: 90%;
        }
        #retry-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 14px 40px;
            font-size: 20px;
            font-weight: bold;
            background: #ff5722;
            color: #fff;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            display: none;
            z-index: 25;
            box-shadow: 0 0 20px rgba(255,87,34,0.5);
        }
        #retry-btn:hover { background: #e64a19; }

        /* Companion banner area */
        #companion-area {
            width: 100%;
            min-height: 60px;
            background: #0f0f0f;
            border-top: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 6px 10px;
            overflow-x: auto;
        }
        #companion-area img {
            max-height: 55px;
            max-width: 180px;
            border-radius: 6px;
            border: 1px solid #333;
        }
        #companion-area .placeholder {
            color: #555;
            font-size: 13px;
        }

        #bottom-bar {
            height: 80px;
            min-height: 80px;
            background: #1c1c1e;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            gap: 10px;
            flex-wrap: nowrap;
        }
        .sponsor-text {
            color: #888;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
        }
        .sponsor-text span { color: #aaa; font-weight: 300; }
        .action-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .btn {
            padding: 10px 28px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.94); }
        .btn-download {
            background: #34a853;
            color: #fff;
        }
        .btn-download:hover { background: #2d9248; }
        .btn-share { background: #1a73e8; color: #fff; }
        .btn-share:hover { background: #1558b0; }
        .btn-fullscreen {
            background: #6b7280;
            color: #fff;
        }
        .btn-fullscreen:hover { background: #4b5563; }

        .ad-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 15;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            pointer-events: none;
        }
        .ad-controls * { pointer-events: auto; }
        .ad-countdown {
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            min-width: 80px;
            text-align: center;
        }
        .ad-skip-btn {
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
        }
        .ad-skip-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .ad-skip-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.15);
            border-color: #fff;
        }
        #ad-status {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            font-size: 13px;
            background: rgba(0,0,0,0.6);
            padding: 6px 18px;
            border-radius: 20px;
            z-index: 15;
            pointer-events: none;
            white-space: nowrap;
        }
        #ad-info {
            position: absolute;
            bottom: 80px;
            left: 20px;
            color: #aaa;
            font-size: 13px;
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 20px;
            z-index: 15;
            display: none;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 600px) {
            .btn { padding: 8px 16px; font-size: 14px; }
            .sponsor-text { font-size: 11px; }
            #play-btn { padding: 14px 30px; font-size: 22px; }
            #bottom-bar { padding: 0 12px; height: 70px; min-height: 70px; }
            .ad-controls { gap: 10px; padding: 8px 14px; flex-wrap: wrap; justify-content: center; }
            .ad-countdown { font-size: 12px; min-width: 60px; }
            #companion-area img { max-height: 45px; max-width: 120px; }
        }
    </style>
</head>
<body>
<div id="main">
    <div id="ad-container">
        <video id="ad-video" playsinline controls></video>
        <div id="loading">
            <div class="spinner"></div>
            <span>Loading ad...</span>
        </div>
        <button id="play-btn">▶ Fetch & Play Ad</button>
        <button id="retry-btn">🔄 Retry</button>
        <div id="error-msg"></div>
        <div id="ad-status">Initializing...</div>
        <div id="ad-info">📛 Ad Title · ⏱️ Duration</div>

        <div id="companion-area">
            <span class="placeholder">📸 Companion banner will appear here</span>
        </div>

        <div class="ad-controls" id="ad-controls" style="display:none;">
            <span class="ad-countdown" id="ad-countdown">Ad · 0s</span>
            <button class="ad-skip-btn" id="ad-skip-btn" disabled>Skip ⏳</button>
        </div>
    </div>

    <div id="bottom-bar">
        <div class="sponsor-text">📢 <span>Sponsored</span> · Google Play</div>
        <div class="action-buttons">
            <!-- ✅ Download button (advertiser link) -->
            <a href="#" id="download-link" class="btn btn-download" target="_blank" style="display:none;">⬇️ Download</a>
            <button id="share-btn" class="btn btn-share">🔗 Share</button>
            <button id="fullscreen-btn" class="btn btn-fullscreen">⛶ Full Screen</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ===== 🔴 ONLY VAST URL =====
        const VAST_URL = 'https://difficultblock.com/dxm.FazZdVGvNlv/Z/G/Ux/EeCmJ9NubZPUplokgPvT/cfyPN_Dbkh2/NDjkkdtSNezsI/0UOvT/Yr3ZMJwo';
        const DEFAULT_CTA = 'https://google.com';
        const SKIP_DELAY = 6;

        const video = document.getElementById('ad-video');
        const container = document.getElementById('ad-container');
        const main = document.getElementById('main');
        const playBtn = document.getElementById('play-btn');
        const retryBtn = document.getElementById('retry-btn');
        const errorMsg = document.getElementById('error-msg');
        const loading = document.getElementById('loading');
        const adStatus = document.getElementById('ad-status');
        const adControls = document.getElementById('ad-controls');
        const countdown = document.getElementById('ad-countdown');
        const skipBtn = document.getElementById('ad-skip-btn');
        const downloadLink = document.getElementById('download-link');
        const shareBtn = document.getElementById('share-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const companionArea = document.getElementById('companion-area');
        const adInfo = document.getElementById('ad-info');

        let isAdPlaying = false;
        let skipInterval = null;
        let currentClickUrl = '';

        function setStatus(msg) { adStatus.textContent = msg; console.log('[Ad]', msg); }
        function showError(msg, showRetry = false) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = '⚠️ ' + msg;
            retryBtn.style.display = showRetry ? 'block' : 'none';
        }
        function hideError() {
            errorMsg.style.display = 'none';
            retryBtn.style.display = 'none';
        }
        function showLoading(show) {
            loading.style.display = show ? 'flex' : 'none';
        }
        function showControls(show) {
            adControls.style.display = show ? 'flex' : 'none';
        }
        function showAdInfo(title, duration) {
            adInfo.style.display = 'block';
            adInfo.textContent = '📛 ' + title + ' · ⏱️ ' + duration;
        }
        function hideAdInfo() { adInfo.style.display = 'none'; }

        function resetPlayer() {
            isAdPlaying = false;
            clearInterval(skipInterval);
            video.pause();
            video.removeAttribute('src');
            video.load();
            showControls(false);
            skipBtn.disabled = true;
            skipBtn.textContent = 'Skip ⏳';
            countdown.textContent = 'Ad · 0s';
            playBtn.style.display = 'block';
            playBtn.textContent = '▶ Fetch & Play Ad';
            hideError();
            showLoading(false);
            setStatus('Ready');
            downloadLink.style.display = 'none';
            hideAdInfo();
            companionArea.innerHTML = '<span class="placeholder">📸 Companion banner will appear here</span>';
        }

        // ===== PARSE VAST =====
        function parseVASTAndPlay(xmlString) {
            try {
                const parser = new DOMParser();
                const xml = parser.parseFromString(xmlString, 'text/xml');
                const parseError = xml.querySelector('parsererror');
                if (parseError) {
                    showError('Invalid XML response', true);
                    setStatus('Parse error');
                    showLoading(false);
                    playBtn.style.display = 'block';
                    return;
                }

                let title = 'Untitled';
                const titleNode = xml.querySelector('AdTitle');
                if (titleNode) title = titleNode.textContent.trim();

                let duration = 'N/A';
                const durNode = xml.querySelector('Duration');
                if (durNode) duration = durNode.textContent.trim();

                const mediaFiles = xml.querySelectorAll('MediaFile');
                let videoUrl = null;
                for (let node of mediaFiles) {
                    const type = node.getAttribute('type') || '';
                    const url = node.textContent.trim();
                    if (url && (type.includes('mp4') || type.includes('video/mp4'))) {
                        videoUrl = url;
                        break;
                    }
                }
                if (!videoUrl) {
                    for (let node of mediaFiles) {
                        const type = node.getAttribute('type') || '';
                        const url = node.textContent.trim();
                        if (url && type.includes('video')) {
                            videoUrl = url;
                            break;
                        }
                    }
                }
                if (!videoUrl) {
                    showError('No MP4 video found in VAST', true);
                    setStatus('No video');
                    showLoading(false);
                    playBtn.style.display = 'block';
                    return;
                }

                currentClickUrl = '';
                const clickThroughNode = xml.querySelector('ClickThrough');
                if (clickThroughNode) {
                    currentClickUrl = clickThroughNode.textContent.trim();
                }

                showLoading(false);
                video.src = videoUrl;
                video.load();
                video.play().catch(() => {});
                setStatus('Playing: ' + title);
                showAdInfo(title, duration);

                // ✅ Download button = advertiser link (but text is "Download")
                if (currentClickUrl) {
                    downloadLink.href = currentClickUrl;
                } else {
                    downloadLink.href = DEFAULT_CTA;
                }
                downloadLink.style.display = 'inline-flex';
                downloadLink.textContent = '⬇️ Download';

                // Companion banners
                companionArea.innerHTML = '';
                const companions = xml.querySelectorAll('Companion');
                let hasCompanion = false;
                companions.forEach(comp => {
                    const clickThrough = comp.querySelector('CompanionClickThrough');
                    const staticRes = comp.querySelector('StaticResource');
                    if (staticRes) {
                        const imgUrl = staticRes.textContent.trim();
                        const wrapper = document.createElement('div');
                        wrapper.style.display = 'inline-block';
                        wrapper.style.margin = '4px';
                        let img = document.createElement('img');
                        img.src = imgUrl;
                        img.alt = 'Companion Ad';
                        if (clickThrough) {
                            const a = document.createElement('a');
                            a.href = clickThrough.textContent.trim();
                            a.target = '_blank';
                            a.appendChild(img);
                            wrapper.appendChild(a);
                        } else {
                            wrapper.appendChild(img);
                        }
                        companionArea.appendChild(wrapper);
                        hasCompanion = true;
                    }
                });
                if (!hasCompanion) {
                    companionArea.innerHTML = '<span class="placeholder">📸 No companion banner in this VAST</span>';
                }

                isAdPlaying = true;
                showControls(true);
                startSkipTimer();

                playBtn.style.display = 'none';
                setStatus('Ad playing');

                video.onended = function() {
                    finishAd();
                };

            } catch(e) {
                showError('Parse error: ' + e.message, true);
                setStatus('Error');
                showLoading(false);
                playBtn.style.display = 'block';
            }
        }

        // ===== FETCH VAST =====
        function fetchAndPlay() {
            resetPlayer();
            hideError();
            showLoading(true);
            setStatus('Fetching VAST...');
            playBtn.style.display = 'none';

            fetch(VAST_URL, { mode: 'cors' })
                .then(response => {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.text();
                })
                .then(xml => parseVASTAndPlay(xml))
                .catch(error => {
                    showError('Fetch error: ' + error.message, true);
                    setStatus('Network error');
                    showLoading(false);
                    playBtn.style.display = 'block';
                });
        }

        // ===== SKIP TIMER =====
        function startSkipTimer() {
            let rem = SKIP_DELAY;
            skipBtn.disabled = true;
            skipBtn.textContent = `Skip ⏳ ${rem}s`;
            countdown.textContent = `Ad · ${rem}s`;
            skipInterval = setInterval(() => {
                rem--;
                if (rem <= 0) {
                    clearInterval(skipInterval);
                    skipBtn.disabled = false;
                    skipBtn.textContent = 'Skip ▶';
                    countdown.textContent = 'Skip now';
                } else {
                    skipBtn.textContent = `Skip ⏳ ${rem}s`;
                    countdown.textContent = `Ad · ${rem}s`;
                }
            }, 1000);
        }

        function finishAd() {
            clearInterval(skipInterval);
            setStatus('Ad finished');
            resetPlayer();
            playBtn.style.display = 'block';
            playBtn.textContent = '▶ Play Again';
            // Download link ko rakhein
            if (downloadLink.style.display !== 'none') {
                // keep it
            }
        }

        // ===== FULLSCREEN =====
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                main.requestFullscreen().catch(err => {
                    alert('Fullscreen not supported: ' + err.message);
                });
            } else {
                document.exitFullscreen().catch(() => {});
            }
        }

        // ===== EVENTS =====
        playBtn.addEventListener('click', fetchAndPlay);
        retryBtn.addEventListener('click', fetchAndPlay);

        skipBtn.addEventListener('click', () => {
            if (skipBtn.disabled) return;
            finishAd();
        });

        fullscreenBtn.addEventListener('click', toggleFullscreen);

        shareBtn.addEventListener('click', () => {
            const data = {
                title: 'Check this app!',
                text: 'Download now!',
                url: downloadLink.href || window.location.href
            };
            if (navigator.share) {
                navigator.share(data).catch(()=>{});
            } else {
                const input = document.createElement('input');
                input.value = data.url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert('Link copied!');
            }
        });

        // Init
        setStatus('Ready');
        playBtn.style.display = 'block';
        showControls(false);
        console.log('✅ VAST Full Player ready. URL:', VAST_URL);
    })();
</script>
</body>
</html>
