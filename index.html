<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .box {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            border: 1px solid #334155;
        }
        h1 { color: #38bdf8; }
        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            background: #4285F4;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-danger { background: #dc2626; }
        .info { background: #0f172a; padding: 16px; border-radius: 8px; margin: 16px 0; text-align: left; }
        .info p { margin: 6px 0; font-size: 14px; }
        .badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            display: inline-block;
        }
        .badge-in { background: #065f46; color: #34d399; }
        .badge-out { background: #451a03; color: #fbbf24; }
        .error-msg { color: #f87171; background: #7f1d1d; padding: 10px; border-radius: 6px; margin-top: 10px; }
        .success-msg { color: #34d399; background: #065f46; padding: 10px; border-radius: 6px; margin-top: 10px; }
        .redirect-note {
            background: #1e3a5f;
            border: 1px solid #2563eb;
            border-radius: 6px;
            padding: 10px;
            font-size: 13px;
            color: #93c5fd;
            margin-top: 16px;
        }
        .redirect-note strong { color: #60a5fa; }
    </style>
</head>
<body>

<div class="box">
    <h1>🔐 Google Login</h1>
    <p style="color:#94a3b8;">Test Panel</p>

    <div id="badge" class="badge badge-out">⏳ Checking...</div>

    <div id="userInfo" style="display:none;">
        <div class="info">
            <p><strong>👤 Name:</strong> <span id="name">-</span></p>
            <p><strong>📧 Email:</strong> <span id="email">-</span></p>
            <p><strong>🆔 ID:</strong> <span id="id">-</span></p>
        </div>
        <button class="btn btn-danger" id="logoutBtn">🚪 Logout</button>
    </div>

    <div id="loginDiv">
        <button class="btn" id="loginBtn">🔑 Sign in with Google</button>
    </div>

    <div id="message"></div>

    <div class="redirect-note">
        ✅ Redirect: <strong>https://taskexpert.pages.dev</strong>
    </div>
</div>

<script>
    console.log('🚀 Script loaded!');

    // ============= CONFIG =============
    const SUPABASE_URL = 'https://bfqkwwkvnioreeagyvco.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_BVS4gTa_FpesnI8t3CTUjw_qxNUwiHG';
    const REDIRECT_URL = 'https://taskexpert.pages.dev';

    // ============= CHECK SUPABASE =============
    if (typeof supabase === 'undefined') {
        document.getElementById('message').innerHTML = 
            '<div class="error-msg">❌ Supabase library not loaded! Check internet.</div>';
        console.error('Supabase not loaded!');
    } else {
        console.log('✅ Supabase loaded');
    }

    // ============= INIT =============
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============= DOM REFS =============
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginDiv = document.getElementById('loginDiv');
    const userInfo = document.getElementById('userInfo');
    const badge = document.getElementById('badge');
    const nameEl = document.getElementById('name');
    const emailEl = document.getElementById('email');
    const idEl = document.getElementById('id');
    const msg = document.getElementById('message');

    function showMsg(text, type = 'error') {
        msg.innerHTML = `<div class="${type === 'error' ? 'error-msg' : 'success-msg'}">${text}</div>`;
        setTimeout(() => msg.innerHTML = '', 5000);
    }

    function updateUI(user) {
        if (user) {
            badge.textContent = '✅ Logged In';
            badge.className = 'badge badge-in';
            loginDiv.style.display = 'none';
            userInfo.style.display = 'block';
            nameEl.textContent = user.user_metadata?.full_name || user.email || 'N/A';
            emailEl.textContent = user.email || 'N/A';
            idEl.textContent = user.id || 'N/A';
            showMsg('✅ Welcome ' + (user.user_metadata?.full_name || user.email), 'success');
        } else {
            badge.textContent = '🔴 Logged Out';
            badge.className = 'badge badge-out';
            loginDiv.style.display = 'block';
            userInfo.style.display = 'none';
        }
    }

    // ============= LOGIN =============
    async function login() {
        console.log('🔑 Login button clicked!');
        showMsg('⏳ Redirecting to Google...', 'success');
        try {
            const { data, error } = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: REDIRECT_URL }
            });
            console.log('Login response:', { data, error });
            if (error) {
                showMsg('❌ Error: ' + error.message, 'error');
                console.error('Login error:', error);
            } else {
                console.log('✅ Redirect initiated');
                showMsg('🔄 Redirecting to Google...', 'success');
            }
        } catch (err) {
            showMsg('❌ Exception: ' + err.message, 'error');
            console.error('Exception:', err);
        }
    }

    // ============= LOGOUT =============
    async function logout() {
        await sb.auth.signOut();
        updateUI(null);
        showMsg('👋 Logged out', 'error');
    }

    // ============= CHECK SESSION =============
    async function checkSession() {
        console.log('Checking session...');
        try {
            const { data: { session }, error } = await sb.auth.getSession();
            console.log('Session:', session);
            if (error) {
                console.error('Session error:', error);
                updateUI(null);
                return;
            }
            if (session) {
                updateUI(session.user);
            } else {
                updateUI(null);
            }
        } catch (err) {
            console.error('Check error:', err);
            updateUI(null);
        }
    }

    // ============= AUTH STATE CHANGE =============
    sb.auth.onAuthStateChange((event, session) => {
        console.log('Auth event:', event, session);
        if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
            if (session) updateUI(session.user);
        } else if (event === 'SIGNED_OUT') {
            updateUI(null);
        }
    });

    // ============= EVENT LISTENERS =============
    document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM ready');
        loginBtn.addEventListener('click', login);
        logoutBtn.addEventListener('click', logout);
        checkSession();
    });

    // Extra: Agar button par click nahi ho raha, toh console se manually test karein
    console.log('ℹ️ Type "loginTest()" in console to test manually');
    window.loginTest = login;
</script>
</body>
</html>
