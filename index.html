<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎰 Spin & Win – Full-Screen Ad + CTA Link</title>
    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
    <style>
        :root {
            --bg: #0a0a12; --surface: #151520; --surface2: #1a1a2e;
            --accent: #a855f7; --accent2: #ec4899; --accent3: #6366f1;
            --gold: #f59e0b; --text: #e2e8f0; --text2: #94a3b8;
            --border: #1e1e32; --radius: 20px; --radius-sm: 12px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font); background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(168,85,247,0.08) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 60%, rgba(236,72,153,0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 80%, rgba(99,102,241,0.05) 0%, transparent 55%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            color: var(--text); user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .main-container { display: flex; gap: 24px; padding: 20px; max-width: 1100px; width: 100%; flex-wrap: wrap; justify-content: center; }
        .wheel-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 30px 28px 24px; display: flex; flex-direction: column; align-items: center; gap: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); flex: 1 1 500px; max-width: 580px; min-width: 340px;
            position: relative;
        }
        .wheel-card .title { font-size: 1.7em; font-weight: 800; text-align: center; background: linear-gradient(135deg,#fff,#d4bfff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .wheel-wrapper { position: relative; }
        .pointer {
            position: absolute; top: -18px; left: 50%; transform: translateX(-50%); z-index: 10;
            font-size: 2.2em; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); animation: pointerBounce 1.8s infinite;
        }
        @keyframes pointerBounce { 0%,100%{ transform:translateX(-50%) translateY(0); } 50%{ transform:translateX(-50%) translateY(6px); } }
        canvas#spinWheel {
            border-radius: 50%; box-shadow: 0 0 50px var(--glow), 0 10px 40px rgba(0,0,0,0.6);
            cursor: pointer; transition: filter 0.3s;
        }
        canvas#spinWheel.idle:hover { filter: brightness(1.1); }
        .btn-spin {
            padding: 16px 50px; font-size: 1.2em; font-weight: 700; letter-spacing: 1px;
            border: none; border-radius: 50px; cursor: pointer; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            box-shadow: 0 8px 30px rgba(236,72,153,0.4); transition: all 0.3s;
        }
        .btn-spin:disabled { opacity: 0.5; cursor: not-allowed; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:0.7} }
        .side-panel {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 24px 20px; display: flex; flex-direction: column; gap: 18px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); flex: 0 0 300px; max-width: 340px;
            position: sticky; top: 20px; align-self: flex-start;
        }
        .stat-row { display: flex; justify-content: space-between; padding: 12px 16px; background: var(--surface2); border-radius: var(--radius-sm); border: 1px solid var(--border); }
        .stat-label { font-size: 0.85em; color: var(--text2); }
        .stat-value { font-size: 1.1em; font-weight: 700; color: var(--gold); }
        .history-list { max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .history-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--surface2); border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 0.85em; animation: fadeInUp 0.4s; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .prize-dot { width: 10px; height: 10px; border-radius: 50%; }

        /* ========== FULLSCREEN AD OVERLAY ========== */
        .ad-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95); z-index:1000;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            backdrop-filter: blur(12px); animation: fadeIn 0.3s;
        }
        .ad-overlay.hidden { display: none; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .ad-container {
            width: 100%; height: calc(100% - 100px); /* leave space for controls & CTA */
            position: relative; background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .ad-container video {
            width: 100%; height: 100%; object-fit: contain; background: #000;
        }
        /* loading spinner inside video container */
        .ad-loading {
            position: absolute; inset:0; display:flex; align-items:center; justify-content:center;
            flex-direction: column; gap:12px; color:#fff; background:rgba(0,0,0,0.8); z-index:5;
        }
        .ad-spinner {
            width:44px; height:44px; border:4px solid rgba(255,255,255,0.2);
            border-top-color: var(--accent); border-radius:50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to{transform:rotate(360deg)} }

        /* Controls & CTA area (bottom strip) */
        .ad-bottom-bar {
            width: 100%; height: auto; min-height: 90px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 8px; padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .ad-timer-bar {
            width: 90%; max-width: 600px; height: 5px;
            background: rgba(255,255,255,0.15); border-radius: 10px; overflow: hidden;
        }
        .ad-timer-fill {
            height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
            width: 100%; transition: width 0.3s linear;
        }
        .ad-controls {
            display: flex; gap: 15px; align-items: center; flex-wrap: wrap; justify-content: center;
        }
        .ad-skip-btn {
            padding: 10px 24px; border-radius: 30px;
            border: 2px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.08); color: #fff;
            cursor: pointer; font-weight: 600; font-size: 0.9em;
            transition: all 0.3s;
        }
        .ad-skip-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .ad-skip-btn:hover:not(:disabled) { background: rgba(255,255,255,0.2); border-color: #fff; }
        .ad-countdown { color: #fff; font-weight: 700; font-size: 0.95em; min-width: 100px; text-align: center; }

        /* CTA Link Button */
        .ad-cta-button {
            padding: 10px 28px; border-radius: 30px;
            border: none; background: linear-gradient(135deg, #f59e0b, #f97316);
            color: #000; font-weight: 700; font-size: 0.95em;
            cursor: pointer; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 6px 20px rgba(245,158,11,0.4);
            transition: all 0.3s;
            text-decoration: none;
        }
        .ad-cta-button:hover { transform: scale(1.03); box-shadow: 0 8px 25px rgba(245,158,11,0.6); }
        .ad-status { color: #aaa; font-size: 0.8em; text-align: center; margin-top: 4px; }

        /* WIN MODAL (unchanged) */
        .win-modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7); z-index:900; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px); animation: fadeIn 0.25s;
        }
        .win-modal-overlay.hidden { display: none; }
        .win-modal {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 30px 24px; text-align: center; max-width: 420px; width: 90%;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
        .win-emoji { font-size: 4em; animation: celebrateBounce 0.6s; }
        @keyframes celebrateBounce { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .win-amount { font-size: 2.5em; font-weight: 900; background: linear-gradient(135deg, var(--gold), #fbbf24); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin:8px 0; }
        .btn-close-win { margin-top:16px; padding:12px 36px; border-radius:30px; border:none; background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#fff; font-weight:700; cursor:pointer; }

        /* Confetti canvas */
        canvas#confettiCanvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:950; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .wheel-card { max-width:100%; width:100%; }
            .side-panel { position:static; max-width:100%; width:100%; }
            .ad-container { height: calc(100% - 110px); }
            .ad-bottom-bar { min-height: 100px; }
        }
    </style>
</head>
<body>
    <canvas id="confettiCanvas"></canvas>

    <div class="main-container">
        <div class="wheel-card">
            <div class="title">🎰 Spin & Win</div>
            <div class="wheel-wrapper">
                <div class="pointer">▼</div>
                <canvas id="spinWheel" width="380" height="380"></canvas>
            </div>
            <button class="btn-spin" id="btnSpin">▶ SPIN NOW</button>
            <div style="font-size:0.75em;color:var(--text2);">📺 Watch a short ad to unlock each spin</div>
        </div>

        <div class="side-panel">
            <h3>📊 Your Stats</h3>
            <div class="stat-row"><span class="stat-label">Total Spins</span><span class="stat-value" id="totalSpins">0</span></div>
            <div class="stat-row"><span class="stat-label">Total Points</span><span class="stat-value" id="totalPoints">0</span></div>
            <div class="stat-row"><span class="stat-label">Biggest Win</span><span class="stat-value" id="biggestWin">—</span></div>
            <span class="badge" style="text-align:center;padding:5px 12px;background:rgba(16,185,129,0.15);color:var(--success);border-radius:20px;">🎯 Spin to earn rewards</span>
            <h3>🕒 Recent Spins</h3>
            <div class="history-list" id="historyList"><div class="empty-history">No spins yet.</div></div>
        </div>
    </div>

    <!-- ========== FULLSCREEN AD OVERLAY ========== -->
    <div class="ad-overlay hidden" id="adOverlay">
        <div class="ad-container" id="adContainer">
            <video id="adVideo" playsinline muted></video>
            <div class="ad-loading" id="adLoading">
                <div class="ad-spinner"></div>
                <span>Loading ad...</span>
            </div>
        </div>

        <!-- Bottom bar with timer, controls, and CTA -->
        <div class="ad-bottom-bar">
            <div class="ad-timer-bar"><div class="ad-timer-fill" id="adTimerFill"></div></div>
            <div class="ad-controls">
                <span class="ad-countdown" id="adCountdown">Preparing...</span>
                <button class="ad-skip-btn" id="adSkipBtn" disabled>Skip Ad ⏳</button>
                <a class="ad-cta-button" id="adCtaButton" href="#" target="_blank" rel="noopener">
                    🔗 Visit Advertiser
                </a>
            </div>
            <div class="ad-status" id="adStatus">Initializing...</div>
        </div>
    </div>

    <!-- WIN MODAL -->
    <div class="win-modal-overlay hidden" id="winModalOverlay">
        <div class="win-modal">
            <div class="win-emoji">🎉</div>
            <div class="win-amount" id="winAmount">+500</div>
            <button class="btn-close-win" id="btnCloseWin">🎯 AWESOME!</button>
        </div>
    </div>

    <script>
        (function() {
            // ========== CONFIG ==========
            const HILLTOPADS_ZONE = '434f183aaa02fda862b7';
            const CUSTOM_VAST = 'https://difficultblock.com/dRmeF.zOdmGANKvNZBG/UX/qe-mt9qu/ZTUDlakLPgTGcjxFNBzRICyQOBDwk/tLNiz-Ep3/MNjSII5QMPw_';
            const GOOGLE_DEMO_VAST = 'https://pubads.g.doubleclick.net/gampad/ads?iu=/21775744923/external/single_preroll_skippable&sz=640x480&ciu_szs=300x250&gdfp_req=1&output=vast&unviewed_position_start=1&env=vp&impl=s&correlator=' + Math.random();
            const FALLBACK_MP4 = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4';
            const DEFAULT_CTA_LINK = 'https://google.com'; // default CTA for MP4 or if no VAST click URL

            const AD_TAGS = [
                `https://hilltopads.com/vast?zone_id=${HILLTOPADS_ZONE}`,
                CUSTOM_VAST,
                GOOGLE_DEMO_VAST,
                'mp4:' + FALLBACK_MP4
            ];
            const AD_SKIP_DELAY = 6;
            const AD_LOAD_TIMEOUT = 10000;

            const prizes = [
                { label: '🏆 2000', value: 2000, color: '#f59e0b', textColor: '#000' },
                { label: '💎 1000', value: 1000, color: '#8b5cf6', textColor: '#fff' },
                { label: '🎁 750', value: 750, color: '#ec4899', textColor: '#fff' },
                { label: '⭐ 500', value: 500, color: '#6366f1', textColor: '#fff' },
                { label: '🎯 250', value: 250, color: '#10b981', textColor: '#fff' },
                { label: '💫 100', value: 100, color: '#06b6d4', textColor: '#fff' },
                { label: '🔄 Bonus', value: 'bonus', color: '#f97316', textColor: '#fff' },
                { label: '🍀 50', value: 50, color: '#84cc16', textColor: '#000' }
            ];
            const segmentCount = prizes.length, segmentAngle = (2*Math.PI)/segmentCount;

            // DOM
            const canvas = document.getElementById('spinWheel'), ctx = canvas.getContext('2d');
            const btnSpin = document.getElementById('btnSpin');
            const adOverlay = document.getElementById('adOverlay');
            const adVideo = document.getElementById('adVideo');
            const adLoading = document.getElementById('adLoading');
            const adTimerFill = document.getElementById('adTimerFill');
            const adCountdown = document.getElementById('adCountdown');
            const adSkipBtn = document.getElementById('adSkipBtn');
            const adCtaButton = document.getElementById('adCtaButton');
            const adContainer = document.getElementById('adContainer');
            const adStatus = document.getElementById('adStatus');
            const winModalOverlay = document.getElementById('winModalOverlay');
            const winAmount = document.getElementById('winAmount');
            const btnCloseWin = document.getElementById('btnCloseWin');
            const confettiCanvas = document.getElementById('confettiCanvas');
            const confettiCtx = confettiCanvas.getContext('2d');
            const historyList = document.getElementById('historyList');
            const totalSpinsEl = document.getElementById('totalSpins'), totalPointsEl = document.getElementById('totalPoints'), biggestWinEl = document.getElementById('biggestWin');

            let currentRotation = 0, isSpinning = false, isAdPlaying = false;
            let adManager = null, adsLoader = null, adDisplayContainer = null, adsInitialized = false;
            let adTagIndex = 0, currentAdTag = AD_TAGS[0];
            let adSkipInterval = null, adTimeout = null, adProgressInterval = null;
            let totalSpins = 0, totalPoints = 0, biggestWin = 0, winHistory = [];
            let confettiParticles = [], confettiActive = false;
            let mp4FallbackActive = false;
            let currentCtaLink = DEFAULT_CTA_LINK; // can be updated if VAST provides clickthrough

            // Data
            function loadData() {
                try { const d=JSON.parse(localStorage.getItem('spinWheelData')||'{}'); totalSpins=d.totalSpins||0; totalPoints=d.totalPoints||0; biggestWin=d.biggestWin||0; winHistory=d.winHistory||[]; } catch(e){}
            }
            function saveData() {
                try { localStorage.setItem('spinWheelData', JSON.stringify({totalSpins,totalPoints,biggestWin,winHistory:winHistory.slice(0,50)})); } catch(e){}
            }
            function updateUI() {
                totalSpinsEl.textContent = totalSpins;
                totalPointsEl.textContent = totalPoints.toLocaleString();
                biggestWinEl.textContent = biggestWin>0 ? biggestWin.toLocaleString()+' pts' : '—';
                historyList.innerHTML = winHistory.length===0 ? '<div class="empty-history">No spins yet.</div>' :
                    winHistory.slice().reverse().slice(0,15).map(h=>`
                        <div class="history-item"><div class="prize-dot" style="background:${h.color}"></div>
                        <span class="prize-name">${h.label}</span><span class="prize-time">${new Date(h.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div>`).join('');
            }
            loadData(); updateUI();

            // Wheel
            function drawWheel(rot) {
                const cx=canvas.width/2, cy=canvas.height/2, r=Math.min(cx,cy)-8;
                ctx.clearRect(0,0,canvas.width,canvas.height);
                for(let i=0;i<segmentCount;i++) {
                    const sa=rot+i*segmentAngle, ea=sa+segmentAngle;
                    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,sa,ea); ctx.closePath();
                    const grad=ctx.createLinearGradient(cx+Math.cos(sa)*r*0.5,cy+Math.sin(sa)*r*0.5, cx+Math.cos(ea)*r*0.5,cy+Math.sin(ea)*r*0.5);
                    grad.addColorStop(0,prizes[i].color); grad.addColorStop(1, lighten(prizes[i].color,0.25));
                    ctx.fillStyle=grad; ctx.fill(); ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=2; ctx.stroke();
                    ctx.save(); ctx.translate(cx,cy); ctx.rotate(sa+segmentAngle/2);
                    ctx.fillStyle=prizes[i].textColor; ctx.font='bold 15px "Segoe UI"'; ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=3;
                    ctx.fillText(prizes[i].label, r*0.62, 6); ctx.restore();
                }
                const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,r*0.22);
                cg.addColorStop(0,'#2a2a3a'); cg.addColorStop(1,'#0f0f1a');
                ctx.beginPath(); ctx.arc(cx,cy,r*0.2,0,2*Math.PI); ctx.fillStyle=cg; ctx.fill(); ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=3; ctx.stroke();
                ctx.fillStyle='#fff'; ctx.font='bold 13px "Segoe UI"'; ctx.fillText('SPIN',cx,cy+5);
            }
            function lighten(hex,f) { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgb(${Math.min(255,r+(255-r)*f)},${Math.min(255,g+(255-g)*f)},${Math.min(255,b+(255-b)*f)})`; }
            drawWheel(currentRotation);

            function spinWheel() {
                if(isSpinning) return;
                isSpinning=true; btnSpin.disabled=true; canvas.classList.remove('idle');
                const extra=4+Math.floor(Math.random()*6), rand=Math.random()*2*Math.PI;
                const target=currentRotation+extra*2*Math.PI+rand, duration=3500+Math.random()*1500;
                const startTime=performance.now();
                function anim(now) {
                    const t=Math.min((now-startTime)/duration,1), ease=1-Math.pow(1-t,3);
                    currentRotation=(currentRotation+(target-currentRotation)*ease)%(2*Math.PI);
                    drawWheel(currentRotation);
                    if(t<1) requestAnimationFrame(anim);
                    else { isSpinning=false; btnSpin.disabled=false; canvas.classList.add('idle'); handleWin(target); }
                }
                requestAnimationFrame(anim);
            }
            function handleWin(finalRot) {
                const idx = Math.floor(((3*Math.PI/2 - finalRot%(2*Math.PI)+2*Math.PI)%(2*Math.PI))/segmentAngle)%segmentCount;
                const prize=prizes[idx]; totalSpins++;
                let pts = prize.value==='bonus' ? Math.floor(Math.random()*1500)+500 : prize.value;
                totalPoints+=pts; if(pts>biggestWin) biggestWin=pts;
                winHistory.push({label:prize.value==='bonus'?`🔄 Bonus (${pts} pts)`:prize.label, value:pts, color:prize.color, time:Date.now()});
                saveData(); updateUI();
                winAmount.textContent = '+'+pts.toLocaleString()+' pts';
                winModalOverlay.classList.remove('hidden');
                triggerConfetti();
            }
            btnCloseWin.onclick = ()=>{ winModalOverlay.classList.add('hidden'); stopConfetti(); };
            winModalOverlay.onclick = e=>{ if(e.target===winModalOverlay){ winModalOverlay.classList.add('hidden'); stopConfetti(); } };

            // Confetti
            function resizeConfetti() { confettiCanvas.width=window.innerWidth; confettiCanvas.height=window.innerHeight; }
            window.addEventListener('resize', resizeConfetti); resizeConfetti();
            function triggerConfetti() {
                confettiParticles=[]; const cols=['#a855f7','#ec4899','#f59e0b','#10b981','#6366f1','#f97316','#84cc16','#fff'];
                for(let i=0;i<150;i++) confettiParticles.push({
                    x:Math.random()*confettiCanvas.width, y:-20-Math.random()*100,
                    w:Math.random()*8+3, h:Math.random()*16+6, color:cols[Math.floor(Math.random()*cols.length)],
                    vx:(Math.random()-0.5)*6, vy:Math.random()*4+2, rot:Math.random()*360, rotSp:(Math.random()-0.5)*10,
                    opacity:1, decay:0.003+Math.random()*0.006
                });
                if(!confettiActive) { confettiActive=true; animConfetti(); }
            }
            function animConfetti() {
                if(!confettiActive && confettiParticles.length===0) return;
                confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
                confettiParticles=confettiParticles.filter(p=>p.opacity>0&&p.y<confettiCanvas.height+50);
                for(const p of confettiParticles) {
                    confettiCtx.save(); confettiCtx.globalAlpha=p.opacity;
                    confettiCtx.translate(p.x,p.y); confettiCtx.rotate(p.rot*Math.PI/180);
                    confettiCtx.fillStyle=p.color; confettiCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
                    confettiCtx.restore();
                    p.x+=p.vx; p.vy+=0.15; p.y+=p.vy; p.rot+=p.rotSp; p.opacity-=p.decay;
                }
                if(confettiParticles.length>0) requestAnimationFrame(animConfetti); else confettiActive=false;
            }
            function stopConfetti() { confettiParticles=[]; confettiActive=false; confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height); }

            // ========== AD LOGIC ==========
            function updateAdStatus(msg) { adStatus.textContent = msg; console.log('[Ad]', msg); }

            // CTA link: by default opens DEFAULT_CTA_LINK; for VAST we use adManager.click()
            function setupCtaButton() {
                adCtaButton.onclick = function(e) {
                    e.preventDefault();
                    if(mp4FallbackActive) {
                        window.open(DEFAULT_CTA_LINK, '_blank');
                    } else if(adManager) {
                        try {
                            adManager.click();
                            updateAdStatus('Ad click triggered.');
                        } catch(ex) {
                            window.open(DEFAULT_CTA_LINK, '_blank');
                        }
                    } else {
                        window.open(DEFAULT_CTA_LINK, '_blank');
                    }
                };
                // Optionally update CTA text if we get a specific click URL from VAST (not easy, so keeping generic)
            }

            function showAdOverlay() {
                adOverlay.classList.remove('hidden');
                void adOverlay.offsetWidth;
                mp4FallbackActive = false;
                adVideo.muted = true;
                adVideo.playsInline = true;
                // Reset IMA
                if(adManager) { try{ adManager.destroy(); }catch(e){} adManager=null; }
                if(adsLoader) { adsLoader.destroy(); adsLoader=null; }
                adsInitialized = false;
                adTagIndex = 0;
                currentAdTag = AD_TAGS[0];
                adTimerFill.style.width = '100%';
                adCountdown.textContent = 'Preparing...';
                adSkipBtn.disabled = true;
                adSkipBtn.textContent = 'Skip Ad ⏳';
                showAdLoading();
                updateAdStatus('Initializing ad...');
                setupCtaButton(); // ensure CTA is ready

                if(currentAdTag.startsWith('mp4:')) {
                    playMP4Fallback(currentAdTag.substring(4));
                } else {
                    initIMA();
                    setTimeout(requestAd, 200);
                }
            }

            function hideAdOverlay() {
                adOverlay.classList.add('hidden');
                cleanupAd();
            }

            function initIMA() {
                if(adsInitialized) return;
                adsInitialized = true;
                try {
                    adDisplayContainer = new google.ima.AdDisplayContainer(adContainer, adVideo);
                    adDisplayContainer.initialize();
                    adsLoader = new google.ima.AdsLoader(adDisplayContainer);
                    adsLoader.addEventListener(google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED, onAdsManagerLoaded);
                    adsLoader.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, onAdError);
                } catch(e) {
                    updateAdStatus('IMA init error: ' + e.message);
                    tryNextAdTag();
                }
            }

            function requestAd() {
                updateAdStatus('Requesting ad: ' + currentAdTag);
                const req = new google.ima.AdsRequest();
                req.adTagUrl = currentAdTag;
                req.linearAdSlotWidth = 640;
                req.linearAdSlotHeight = 360;
                req.nonLinearAdSlotWidth = 640;
                req.nonLinearAdSlotHeight = 120;
                req.setAdWillAutoPlay(true);
                req.setAdWillPlayMuted(true);
                try { adsLoader.requestAds(req); } catch(e) { updateAdStatus('Request failed'); tryNextAdTag(); }
                adTimeout = setTimeout(() => { if(!isAdPlaying) { updateAdStatus('Ad load timeout.'); tryNextAdTag(); } }, AD_LOAD_TIMEOUT);
            }

            function onAdsManagerLoaded(event) {
                const settings = new google.ima.AdsRenderingSettings();
                settings.restoreCustomPlaybackStateOnAdBreakComplete = true;
                adManager = event.getAdsManager(adVideo, settings);
                adManager.addEventListener(google.ima.AdEvent.Type.LOADED, ()=>{ hideAdLoading(); clearTimeout(adTimeout); updateAdStatus('Ad loaded.'); });
                adManager.addEventListener(google.ima.AdEvent.Type.STARTED, ()=>{ hideAdLoading(); isAdPlaying=true; updateAdStatus('Ad started.'); startSkipTimer(); startProgress(); clearTimeout(adTimeout); });
                adManager.addEventListener(google.ima.AdEvent.Type.COMPLETE, ()=>{ updateAdStatus('Ad completed.'); finishAd(); });
                adManager.addEventListener(google.ima.AdEvent.Type.SKIPPED, ()=>{ updateAdStatus('Ad skipped.'); finishAd(); });
                adManager.addEventListener(google.ima.AdEvent.Type.ALL_ADS_COMPLETED, finishAd);
                adManager.addEventListener(google.ima.AdErrorEvent.Type.AD_ERROR, onAdError);
                // optionally try to capture click URL (not directly possible, so we'll rely on adManager.click())
                try {
                    adManager.init(640, 360, google.ima.ViewMode.NORMAL);
                    adManager.start();
                } catch(e) { updateAdStatus('AdManager start error.'); tryNextAdTag(); }
            }

            function onAdError(event) {
                const err = event?.getError?.()?.toString() || 'unknown';
                updateAdStatus('Ad error: ' + err);
                clearTimeout(adTimeout);
                tryNextAdTag();
            }

            function tryNextAdTag() {
                adTagIndex++;
                if(adTagIndex < AD_TAGS.length) {
                    currentAdTag = AD_TAGS[adTagIndex];
                    updateAdStatus('Trying next: ' + currentAdTag);
                    if(adManager) { try{adManager.destroy();}catch(e){} adManager=null; }
                    if(adsLoader) { adsLoader.destroy(); adsLoader=null; }
                    adsInitialized = false;
                    clearInterval(adSkipInterval);
                    clearTimeout(adTimeout);
                    clearInterval(adProgressInterval);
                    if(currentAdTag.startsWith('mp4:')) {
                        playMP4Fallback(currentAdTag.substring(4));
                    } else {
                        initIMA();
                        setTimeout(requestAd, 100);
                    }
                } else {
                    updateAdStatus('All ads failed. Allowing spin without ad.');
                    hideAdOverlay();
                    if(!isSpinning && !btnSpin.disabled) setTimeout(spinWheel, 400);
                }
            }

            function playMP4Fallback(url) {
                updateAdStatus('Playing MP4 fallback: ' + url);
                mp4FallbackActive = true;
                hideAdLoading();
                adVideo.src = url;
                adVideo.play().catch(e => updateAdStatus('MP4 play error: ' + e.message));
                isAdPlaying = true;
                startSkipTimer();
                startProgress();
                adVideo.onended = () => { if(mp4FallbackActive) { updateAdStatus('MP4 ended.'); finishAd(); } };
                adVideo.onerror = () => { updateAdStatus('MP4 error.'); hideAdOverlay(); if(!isSpinning) setTimeout(spinWheel,400); };
                // CTA link already defaults to DEFAULT_CTA_LINK
            }

            function finishAd() {
                updateAdStatus('Finishing ad flow.');
                cleanupAd();
                hideAdOverlay();
                if(!isSpinning) setTimeout(spinWheel, 400);
            }

            function cleanupAd() {
                isAdPlaying = false;
                mp4FallbackActive = false;
                clearInterval(adSkipInterval);
                clearTimeout(adTimeout);
                clearInterval(adProgressInterval);
                if(adManager) { try{adManager.destroy();}catch(e){} adManager=null; }
                adVideo.pause();
                adVideo.removeAttribute('src');
                adVideo.load();
                adTimerFill.style.width = '100%';
                adCountdown.textContent = 'Ad playing...';
                adSkipBtn.disabled = true;
                showAdLoading();
            }

            function startSkipTimer() {
                let rem = AD_SKIP_DELAY;
                adSkipBtn.disabled = true;
                adSkipBtn.textContent = `Skip Ad ⏳ ${rem}s`;
                adCountdown.textContent = `Ad playing · ${rem}s`;
                adSkipInterval = setInterval(() => {
                    rem--;
                    if(rem <= 0) {
                        clearInterval(adSkipInterval);
                        adSkipBtn.disabled = false;
                        adSkipBtn.textContent = 'Skip Ad ▶';
                        adCountdown.textContent = 'You can skip now';
                    } else {
                        adSkipBtn.textContent = `Skip Ad ⏳ ${rem}s`;
                        adCountdown.textContent = `Ad playing · ${rem}s`;
                    }
                }, 1000);
            }

            function startProgress() {
                adProgressInterval = setInterval(() => {
                    if(adVideo.duration && adVideo.currentTime >= 0) {
                        const prog = Math.max(0, 1 - adVideo.currentTime/adVideo.duration);
                        adTimerFill.style.width = (prog*100) + '%';
                    }
                }, 200);
            }

            function showAdLoading() { adLoading.style.display = 'flex'; }
            function hideAdLoading() { adLoading.style.display = 'none'; }

            adSkipBtn.onclick = ()=>{
                if(adSkipBtn.disabled) return;
                if(mp4FallbackActive) { adVideo.pause(); finishAd(); }
                else if(adManager) { try { adManager.skip(); } catch(e) { finishAd(); } }
                else finishAd();
            };

            // Spin trigger
            btnSpin.onclick = ()=>{ if(!isSpinning && !isAdPlaying) showAdOverlay(); };
            canvas.onclick = ()=>{ if(!isSpinning && !isAdPlaying) btnSpin.click(); };
            canvas.classList.add('idle');
            document.addEventListener('keydown', e=>{
                if((e.key===' '||e.code==='Space') && !isSpinning && !isAdPlaying && adOverlay.classList.contains('hidden')) {
                    e.preventDefault(); btnSpin.click();
                }
                if(e.key==='Escape' && !winModalOverlay.classList.contains('hidden')) {
                    winModalOverlay.classList.add('hidden'); stopConfetti();
                }
            });

            function handleResize() {
                const w=window.innerWidth;
                if(w<400) { canvas.width=230; canvas.height=230; }
                else if(w<768) { canvas.width=280; canvas.height=280; }
                else { canvas.width=380; canvas.height=380; }
                drawWheel(currentRotation);
            }
            window.addEventListener('resize', handleResize);
            handleResize();

            console.log('✅ Ready! Full-screen ad with CTA link. Tags: HilltopAds → Custom → Demo VAST → MP4.');
        })();
    </script>
</body>
</html>
