<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="clckd" content="c124c5939d8a569ff3823b803fba763f" />
    <title>🎬 VAST Ad Player</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body, html {
            width: 100%; height: 100%;
            background: #0a0a0f;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #main {
            display: flex;
            flex-direction: column;
            width: 100vw; height: 100vh;
            background: #0a0a0f;
        }
        #ad-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #ad-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        #play-btn {
            position: absolute;
            padding: 20px 56px;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #f43f5e, #ec4899);
            color: #fff;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(236, 72, 153, 0.5);
            z-index: 20;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        #play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(236, 72, 153, 0.7);
        }
        #play-btn:active { transform: scale(0.95); }

        #loading {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.85);
            z-index: 10;
            color: #fff;
            gap: 16px;
        }
        #loading .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: #ec4899;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        #loading span {
            font-size: 16px;
            font-weight: 300;
            color: #94a3b8;
        }

        #error-msg {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: #fbbf24;
            background: rgba(0,0,0,0.85);
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            display: none;
            z-index: 30;
            border: 1px solid rgba(251,191,36,0.3);
            text-align: center;
            max-width: 90%;
            backdrop-filter: blur(4px);
        }
        #retry-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 16px 44px;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #f43f5e, #ec4899);
            color: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            display: none;
            z-index: 25;
            box-shadow: 0 0 30px rgba(236,72,153,0.5);
            transition: 0.3s;
        }
        #retry-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(236,72,153,0.7);
        }

        .top-controls {
            position: absolute;
            top: 24px;
            right: 24px;
            display: none;
            align-items: center;
            gap: 16px;
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            border-radius: 50px;
            z-index: 15;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
        }
        .top-controls * { pointer-events: auto; }
        .top-controls .ad-countdown {
            color: #e2e8f0;
            font-weight: 500;
            font-size: 16px;
            min-width: 70px;
            text-align: center;
        }
        .top-controls .ad-skip-btn {
            padding: 8px 24px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.08);
            color: #f1f5f9;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }
        .top-controls .ad-skip-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .top-controls .ad-skip-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.15);
            border-color: #fff;
            transform: scale(1.02);
        }

        .top-controls .sound-btn {
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: #f1f5f9;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
            min-width: 44px;
            text-align: center;
            line-height: 1;
        }
        .top-controls .sound-btn:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }

        .top-controls .btn-download-small {
            padding: 8px 20px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            box-shadow: 0 2px 12px rgba(34,197,94,0.3);
        }
        .top-controls .btn-download-small:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 18px rgba(34,197,94,0.4);
        }

        #bottom-bar {
            height: 84px;
            min-height: 84px;
            background: #111118;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }
        .btn-download-big {
            padding: 14px 48px;
            border-radius: 50px;
            border: none;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            box-shadow: 0 6px 24px rgba(34,197,94,0.35);
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
        }
        .btn-download-big:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 32px rgba(34,197,94,0.5);
            background: linear-gradient(135deg, #2dd55e, #15803d);
        }
        .btn-download-big:active {
            transform: scale(0.95);
        }

        @media (max-width: 600px) {
            #play-btn {
                padding: 16px 36px;
                font-size: 22px;
            }
            .btn-download-big {
                padding: 12px 32px;
                font-size: 16px;
            }
            #bottom-bar {
                height: 74px;
                min-height: 74px;
            }
            .top-controls {
                top: 16px;
                right: 16px;
                padding: 10px 16px;
                gap: 12px;
            }
            .top-controls .ad-countdown {
                font-size: 14px;
                min-width: 60px;
            }
            .top-controls .ad-skip-btn {
                font-size: 14px;
                padding: 6px 18px;
            }
            .top-controls .btn-download-small {
                font-size: 13px;
                padding: 6px 14px;
            }
            .top-controls .sound-btn {
                font-size: 17px;
                padding: 6px 10px;
                min-width: 36px;
            }
            #error-msg {
                font-size: 13px;
                padding: 10px 18px;
                bottom: 100px;
            }
            #retry-btn {
                padding: 12px 32px;
                font-size: 17px;
            }
        }
    </style>
</head>
<body>
<div id="main">
    <div id="ad-container">
        <video id="ad-video" playsinline></video>
        <div id="loading">
            <div class="spinner"></div>
            <span>Loading ad...</span>
        </div>
        <button id="play-btn">▶ Play Ad</button>
        <button id="retry-btn">🔄 Retry</button>
        <div id="error-msg"></div>

        <div class="top-controls" id="top-controls">
            <span class="ad-countdown" id="ad-countdown">Ad · 0s</span>
            <button class="ad-skip-btn" id="ad-skip-btn" disabled>Skip ⏳</button>
            <button class="sound-btn" id="sound-btn">🔊</button>
            <a href="#" id="download-small" class="btn-download-small" target="_blank">⬇️ Download</a>
        </div>
    </div>

    <div id="bottom-bar">
        <a href="#" id="download-big" class="btn-download-big" target="_blank">⬇️ Download</a>
    </div>
</div>

<script>
    (function() {
        const VAST_URL = 'https://difficultblock.com/dxm.FazZdVGvNlv/Z/G/Ux/EeCmJ9NubZPUplokgPvT/cfyPN_Dbkh2/NDjkkdtSNezsI/0UOvT/Yr3ZMJwo';
        const DEFAULT_CTA = 'https://google.com';
        const SKIP_DELAY = 6;

        const video = document.getElementById('ad-video');
        const main = document.getElementById('main');
        const playBtn = document.getElementById('play-btn');
        const retryBtn = document.getElementById('retry-btn');
        const errorMsg = document.getElementById('error-msg');
        const loading = document.getElementById('loading');
        const topControls = document.getElementById('top-controls');
        const countdown = document.getElementById('ad-countdown');
        const skipBtn = document.getElementById('ad-skip-btn');
        const soundBtn = document.getElementById('sound-btn');
        const downloadSmall = document.getElementById('download-small');
        const downloadBig = document.getElementById('download-big');

        let isAdPlaying = false;
        let skipInterval = null;
        let currentClickUrl = '';
        let isMuted = false; // 🔥 Default ON

        // ✅ Audio ON by default
        video.muted = false;
        soundBtn.textContent = '🔊';

        function showError(msg, showRetry = false) {
            errorMsg.style.display = 'block';
            errorMsg.textContent = '⚠️ ' + msg;
            retryBtn.style.display = showRetry ? 'block' : 'none';
        }
        function hideError() {
            errorMsg.style.display = 'none';
            retryBtn.style.display = 'none';
        }
        function showLoading(show) {
            loading.style.display = show ? 'flex' : 'none';
        }
        function showControls(show) {
            topControls.style.display = show ? 'flex' : 'none';
        }

        // ===== TOGGLE SOUND =====
        function toggleSound() {
            video.muted = !video.muted;
            isMuted = video.muted;
            soundBtn.textContent = isMuted ? '🔇' : '🔊';
        }
        soundBtn.addEventListener('click', toggleSound);

        function resetPlayer() {
            isAdPlaying = false;
            clearInterval(skipInterval);
            video.pause();
            video.removeAttribute('src');
            video.load();
            showControls(false);
            skipBtn.disabled = true;
            skipBtn.textContent = 'Skip ⏳';
            countdown.textContent = 'Ad · 0s';
            playBtn.style.display = 'block';
            playBtn.textContent = '▶ Play Ad';
            hideError();
            showLoading(false);
            downloadSmall.style.display = 'none';
            downloadBig.style.display = 'none';
            // ✅ Audio ON by default
            video.muted = false;
            isMuted = false;
            soundBtn.textContent = '🔊';
        }

        function parseVASTAndPlay(xmlString) {
            try {
                const parser = new DOMParser();
                const xml = parser.parseFromString(xmlString, 'text/xml');
                if (xml.querySelector('parsererror')) {
                    showError('Invalid XML', true);
                    showLoading(false);
                    playBtn.style.display = 'block';
                    return;
                }

                const mediaFiles = xml.querySelectorAll('MediaFile');
                let videoUrl = null;
                for (let node of mediaFiles) {
                    const type = node.getAttribute('type') || '';
                    const url = node.textContent.trim();
                    if (url && (type.includes('mp4') || type.includes('video/mp4'))) {
                        videoUrl = url;
                        break;
                    }
                }
                if (!videoUrl) {
                    for (let node of mediaFiles) {
                        const type = node.getAttribute('type') || '';
                        const url = node.textContent.trim();
                        if (url && type.includes('video')) {
                            videoUrl = url;
                            break;
                        }
                    }
                }
                if (!videoUrl) {
                    showError('No MP4 video found', true);
                    showLoading(false);
                    playBtn.style.display = 'block';
                    return;
                }

                currentClickUrl = '';
                const clickNode = xml.querySelector('ClickThrough');
                if (clickNode) currentClickUrl = clickNode.textContent.trim();

                showLoading(false);
                // ✅ Audio ON by default
                video.muted = false;
                isMuted = false;
                soundBtn.textContent = '🔊';
                video.src = videoUrl;
                video.load();
                video.play().catch(() => {});
                showControls(true);
                startSkipTimer();

                const link = currentClickUrl || DEFAULT_CTA;
                downloadSmall.href = link;
                downloadSmall.style.display = 'inline-flex';
                downloadBig.href = link;
                downloadBig.style.display = 'inline-flex';

                playBtn.style.display = 'none';

                video.onended = function() {
                    finishAd();
                };

                if (!document.fullscreenElement) {
                    main.requestFullscreen().catch(() => {});
                }
            } catch(e) {
                showError('Parse error: ' + e.message, true);
                showLoading(false);
                playBtn.style.display = 'block';
            }
        }

        function fetchAndPlay() {
            resetPlayer();
            hideError();
            showLoading(true);
            playBtn.style.display = 'none';

            fetch(VAST_URL, { mode: 'cors' })
                .then(r => {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.text();
                })
                .then(xml => parseVASTAndPlay(xml))
                .catch(err => {
                    showError('Network error: ' + err.message, true);
                    showLoading(false);
                    playBtn.style.display = 'block';
                });
        }

        function startSkipTimer() {
            let rem = SKIP_DELAY;
            skipBtn.disabled = true;
            skipBtn.textContent = `Skip ⏳ ${rem}s`;
            countdown.textContent = `Ad · ${rem}s`;
            skipInterval = setInterval(() => {
                rem--;
                if (rem <= 0) {
                    clearInterval(skipInterval);
                    skipBtn.disabled = false;
                    skipBtn.textContent = 'Skip ▶';
                    countdown.textContent = 'Skip';
                } else {
                    skipBtn.textContent = `Skip ⏳ ${rem}s`;
                    countdown.textContent = `Ad · ${rem}s`;
                }
            }, 1000);
        }

        function finishAd() {
            clearInterval(skipInterval);
            resetPlayer();
            playBtn.style.display = 'block';
            playBtn.textContent = '▶ Play Again';
        }

        skipBtn.addEventListener('click', () => {
            if (skipBtn.disabled) return;
            finishAd();
        });

        playBtn.addEventListener('click', fetchAndPlay);
        retryBtn.addEventListener('click', fetchAndPlay);

        resetPlayer();
        console.log('✅ VAST Ad Player ready — Audio ON by default');
    })();
</script>
</body>
</html>
