<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <!-- ✅ Site verification meta tag (Step 1) -->
    <meta name="clckd" content="c124c5939d8a569ff3823b803fba763f" />
    <title>🎡 Spin Wheel</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a12;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        .container {
            background: #151520;
            padding: 30px 25px;
            border-radius: 24px;
            border: 1px solid #1e1e32;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #d4bfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        .wheel-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }
        .pointer {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.2rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            z-index: 10;
        }
        canvas {
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(168,85,247,0.3);
            display: block;
            margin: 0 auto;
            cursor: pointer;
            transition: filter 0.3s;
        }
        canvas:hover { filter: brightness(1.05); }
        .btn-spin {
            padding: 14px 44px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(236,72,153,0.4);
            transition: 0.3s;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .btn-spin:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 0.5; }
            50% { opacity: 0.7; }
        }
        .result {
            margin-top: 20px;
            font-size: 1.6rem;
            font-weight: 700;
            color: #f59e0b;
            min-height: 3rem;
        }
        .history {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #94a3b8;
            border-top: 1px solid #1e1e32;
            padding-top: 15px;
            max-height: 120px;
            overflow-y: auto;
        }
        .history span {
            display: inline-block;
            background: #1a1a2e;
            padding: 4px 12px;
            border-radius: 20px;
            margin: 4px 6px 4px 0;
            border: 1px solid #1e1e32;
        }
        .badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 14px;
            background: rgba(16,185,129,0.15);
            color: #10b981;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        @media (max-width: 500px) {
            .container { padding: 20px 15px; }
            canvas { width: 280px; height: 280px; }
            .btn-spin { padding: 12px 30px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎡 Spin & Win</h1>
        <div class="wheel-wrapper">
            <div class="pointer">▼</div>
            <canvas id="wheelCanvas" width="380" height="380"></canvas>
        </div>
        <button class="btn-spin" id="spinBtn">▶ SPIN NOW</button>
        <div class="result" id="resultDisplay">🎯 Click spin!</div>
        <div class="badge">⭐ Try your luck</div>
        <div class="history" id="historyList">📋 History: <span>None</span></div>
    </div>

    <script>
        (function() {
            // ---------- PRIZES ----------
            const prizes = [
                { label: '🏆 2000', value: 2000, color: '#f59e0b' },
                { label: '💎 1000', value: 1000, color: '#8b5cf6' },
                { label: '🎁 750', value: 750, color: '#ec4899' },
                { label: '⭐ 500', value: 500, color: '#6366f1' },
                { label: '🎯 250', value: 250, color: '#10b981' },
                { label: '💫 100', value: 100, color: '#06b6d4' },
                { label: '🔄 Bonus', value: 'bonus', color: '#f97316' },
                { label: '🍀 50', value: 50, color: '#84cc16' }
            ];
            const segCount = prizes.length;
            const segAngle = (2 * Math.PI) / segCount;

            // ---------- CANVAS ----------
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const spinBtn = document.getElementById('spinBtn');
            const resultDisplay = document.getElementById('resultDisplay');
            const historyList = document.getElementById('historyList');

            let currentRotation = 0;
            let isSpinning = false;
            let history = [];

            // ---------- DRAW WHEEL ----------
            function drawWheel(rotation) {
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const radius = Math.min(cx, cy) - 8;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (let i = 0; i < segCount; i++) {
                    const start = rotation + i * segAngle;
                    const end = start + segAngle;

                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.arc(cx, cy, radius, start, end);
                    ctx.closePath();

                    // Gradient fill
                    const grad = ctx.createRadialGradient(cx, cy, 10, cx, cy, radius);
                    grad.addColorStop(0, lighten(prizes[i].color, 0.3));
                    grad.addColorStop(1, prizes[i].color);
                    ctx.fillStyle = grad;
                    ctx.fill();

                    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Label
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(start + segAngle / 2);
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 15px "Segoe UI", system-ui, sans-serif';
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 4;
                    ctx.fillText(prizes[i].label, radius * 0.65, 0);
                    ctx.restore();
                }

                // Center circle
                const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 0.22);
                centerGrad.addColorStop(0, '#2a2a3a');
                centerGrad.addColorStop(1, '#0f0f1a');
                ctx.beginPath();
                ctx.arc(cx, cy, radius * 0.22, 0, 2 * Math.PI);
                ctx.fillStyle = centerGrad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px "Segoe UI"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('SPIN', cx, cy + 1);
            }

            function lighten(hex, amount) {
                let r = parseInt(hex.slice(1,3), 16);
                let g = parseInt(hex.slice(3,5), 16);
                let b = parseInt(hex.slice(5,7), 16);
                r = Math.min(255, r + (255 - r) * amount);
                g = Math.min(255, g + (255 - g) * amount);
                b = Math.min(255, b + (255 - b) * amount);
                return `rgb(${r|0},${g|0},${b|0})`;
            }

            drawWheel(currentRotation);

            // ---------- SPIN ----------
            function spinWheel() {
                if (isSpinning) return;
                isSpinning = true;
                spinBtn.disabled = true;

                const extraSpins = 4 + Math.floor(Math.random() * 6); // 4-9 full rotations
                const randomAngle = Math.random() * 2 * Math.PI;
                const target = currentRotation + extraSpins * 2 * Math.PI + randomAngle;
                const duration = 3500 + Math.random() * 1500; // 3.5-5 sec

                const startTime = performance.now();

                function animate(now) {
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    // Ease-out cubic
                    const ease = 1 - Math.pow(1 - progress, 3);
                    const rot = currentRotation + (target - currentRotation) * ease;
                    currentRotation = rot % (2 * Math.PI);
                    drawWheel(currentRotation);

                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        // Spin complete
                        isSpinning = false;
                        spinBtn.disabled = false;
                        determinePrize();
                    }
                }
                requestAnimationFrame(animate);
            }

            function determinePrize() {
                // The pointer is at top (3*PI/2)
                const pointerAngle = 3 * Math.PI / 2;
                // Normalize rotation so pointer points to segment
                const raw = (pointerAngle - currentRotation) % (2 * Math.PI);
                const normalized = (raw + 2 * Math.PI) % (2 * Math.PI);
                const idx = Math.floor(normalized / segAngle) % segCount;
                const prize = prizes[idx];

                // Calculate points
                let points = prize.value;
                if (prize.value === 'bonus') {
                    points = Math.floor(Math.random() * 1500) + 500;
                }

                // Show result
                const label = prize.value === 'bonus' ? `🔄 Bonus (${points} pts)` : prize.label;
                resultDisplay.textContent = `🎉 ${label}`;

                // Add to history
                history.push(label);
                if (history.length > 20) history.shift();
                updateHistory();

                // Optional confetti effect (simple emoji)
                if (points >= 1000) {
                    resultDisplay.textContent += ' 🌟🌟🌟';
                }
            }

            function updateHistory() {
                if (history.length === 0) {
                    historyList.innerHTML = '📋 History: <span>None</span>';
                    return;
                }
                const items = history.map(h => `<span>${h}</span>`).join(' ');
                historyList.innerHTML = `📋 History: ${items}`;
            }

            // ---------- EVENTS ----------
            spinBtn.addEventListener('click', spinWheel);
            canvas.addEventListener('click', () => {
                if (!isSpinning) spinBtn.click();
            });

            // Responsive resize
            function handleResize() {
                const w = window.innerWidth;
                const size = w < 500 ? 280 : (w < 768 ? 340 : 380);
                canvas.width = size;
                canvas.height = size;
                drawWheel(currentRotation);
            }
            window.addEventListener('resize', handleResize);

            // Initial draw after resize
            setTimeout(handleResize, 50);

            console.log('✅ Spin wheel ready!');
        })();
    </script>
</body>
</html>
