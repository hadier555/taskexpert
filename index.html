<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Test - Task Expert</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body { background: #1e3c72; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Arial; }
        .box { background: white; padding: 40px; border-radius: 20px; text-align: center; }
        #adBtn { padding: 20px 40px; font-size: 18px; background: #4CAF50; color: white; border: none; border-radius: 12px; cursor: pointer; }
        #adBtn:disabled { background: #999; }
        #result { margin-top: 20px; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>🎮 HilltopAds Test</h2>
    <button id="adBtn" onclick="runAd()">
        <i class="fas fa-play"></i> Ad چلاؤ + 50 Coins
    </button>
    <div id="result"></div>
</div>

<!-- HilltopAds Script Start - Zone 7172289 -->
<script>
(function(s,u,z,p){
    s.src = u;
    s.setAttribute('data-zone', z);
    s.setAttribute('data-sdk', '__htas');
    (p || document.body).appendChild(s);
})(document.createElement('script'), 'https://inklinkor.com/tag.min.js', 7172289, document.body);
</script>
<!-- HilltopAds Script End -->

<script>
function runAd() {
    const btn = document.getElementById('adBtn');
    const res = document.getElementById('result');
    
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading Ad...';
    res.innerText = 'Ad لوڈ ہو رہا ہے...';
    res.style.color = 'blue';
    
    // 3 Sec انتظار کرو Script Load ہونے کے لیے
    setTimeout(() => {
        if (typeof __htas !== 'undefined') {
            __htas.showRewardedAd({
                onReward: function() {
                    res.innerText = '✅ مبارک! Video مکمل ہوا، 50 Coins مل گئے';
                    res.style.color = 'green';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-redo"></i> دوبارہ چلاؤ';
                },
                onClose: function() {
                    res.innerText = '❌ Ad بند ہو گیا، Coins نہیں ملے';
                    res.style.color = 'red';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-play"></i> دوبارہ کوشش کرو';
                }
            });
        } else {
            res.innerText = '❌ Error: Ad Load نہیں ہوا۔ 5 منٹ بعد Try کرو یا VPN لگاؤ';
            res.style.color = 'red';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-play"></i> دوبارہ چلاؤ';
        }
    }, 3000);
}
</script>

</body>
</html>
